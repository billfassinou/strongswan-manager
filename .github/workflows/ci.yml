name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/web/package-lock.json

      # web/dist est gitignoré et embarqué par //go:embed : sans lui, le go build échoue.
      - name: Build the embedded SPA
        working-directory: backend/web
        run: npm ci && npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum

      # go vet ne dit rien du formatage : 11 fichiers avaient dérivé sans que personne le voie.
      - name: Gofmt
        working-directory: backend
        run: |
          unformatted="$(gofmt -l . | grep -v '^web/' || true)"
          if [ -n "$unformatted" ]; then
            echo "Fichiers non formatés (lancez « gofmt -w » dessus) :"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        working-directory: backend
        run: go vet ./...

      - name: Test
        working-directory: backend
        run: go test ./...

      - name: Integration tests (Postgres réel)
        working-directory: backend
        run: make test-integration

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          # SC1091 : lib/common.sh est résolu à l'exécution (bundle ou /usr/share),
          # shellcheck ne peut pas le suivre statiquement — --source-path lui suffit.
          shellcheck -x --source-path=deploy -e SC1091 \
            deploy/install.sh deploy/uninstall.sh deploy/swanmgrctl \
            deploy/lib/common.sh deploy/scripts/*.sh

  # L'installeur touche PostgreSQL, EPEL, systemd, firewalld : sans exécution réelle, il
  # pourrit en silence entre deux releases. Le runner ubuntu EST une machine systemd + apt,
  # donc on l'installe pour de bon, en mode bundle (le chemin hors-ligne, celui qu'emprunte
  # aussi le one-liner après téléchargement).
  installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/web/package-lock.json
      - working-directory: backend/web
        run: npm ci && npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum

      - name: Assembler un bundle
        run: |
          NAME="strongswan-manager_v0.0.0-ci_linux_amd64"
          mkdir -p "/tmp/$NAME/lib"
          (cd backend && CGO_ENABLED=0 go build -ldflags "-X main.version=v0.0.0-ci" \
            -o "/tmp/$NAME/strongswan-manager" ./cmd/server)
          cp deploy/install.sh deploy/uninstall.sh deploy/swanmgrctl \
             deploy/strongswan-manager.service "/tmp/$NAME/"
          cp deploy/lib/common.sh "/tmp/$NAME/lib/"
          chmod +x "/tmp/$NAME"/{install.sh,uninstall.sh,swanmgrctl}
          echo "BUNDLE=/tmp/$NAME" >> "$GITHUB_ENV"

      - name: Installer (bundle, sans strongSwan)
        run: sudo "$BUNDLE/install.sh" --yes --no-strongswan

      - name: La console répond et impose le changement de mot de passe
        run: |
          set -euo pipefail
          [ -n "$(curl -sk https://127.0.0.1:7926/healthz)" ]

          PASS="$(sudo sed -n 's/^SEED_ADMIN_PASSWORD=//p' /etc/strongswan-manager/strongswan-manager.env)"
          LOGIN="$(curl -sk https://127.0.0.1:7926/api/v1/auth/login \
            -H 'Content-Type: application/json' \
            -d "{\"identity\":\"admin\",\"password\":\"$PASS\"}")"
          echo "$LOGIN" | grep -q '"must_change_password":true' \
            || { echo "le compte admin n'exige pas de changer son mot de passe : $LOGIN"; exit 1; }

          TOK="$(echo "$LOGIN" | sed -n 's/.*"token":"\([^"]*\)".*/\1/p')"
          CODE="$(curl -sk -o /dev/null -w '%{http_code}' https://127.0.0.1:7926/api/v1/tunnels \
            -H "Authorization: Bearer $TOK")"
          [ "$CODE" = 403 ] || { echo "l'API est ouverte avec le mot de passe d'usine (HTTP $CODE)"; exit 1; }

          # Le WebSocket diffuse l'état temps réel des SA. Il est monté hors du middleware :
          # sans ces deux assertions, le verrou 403 pouvait être contourné par /ws — et l'a été.
          CODE="$(curl -sk -o /dev/null -w '%{http_code}' https://127.0.0.1:7926/api/v1/ws)"
          [ "$CODE" = 401 ] || { echo "/ws accepte une connexion SANS jeton (HTTP $CODE)"; exit 1; }
          CODE="$(curl -sk -o /dev/null -w '%{http_code}' "https://127.0.0.1:7926/api/v1/ws?token=$TOK")"
          [ "$CODE" = 403 ] || { echo "/ws est ouvert avec le mot de passe d'usine (HTTP $CODE)"; exit 1; }

          # Après changement, l'API s'ouvre.
          NEW="$(curl -sk https://127.0.0.1:7926/api/v1/me/password -H "Authorization: Bearer $TOK" \
            -H 'Content-Type: application/json' \
            -d "{\"current_password\":\"$PASS\",\"new_password\":\"unMotDePasseSolide\"}")"
          TOK2="$(echo "$NEW" | sed -n 's/.*"token":"\([^"]*\)".*/\1/p')"
          CODE="$(curl -sk -o /dev/null -w '%{http_code}' https://127.0.0.1:7926/api/v1/tunnels \
            -H "Authorization: Bearer $TOK2")"
          [ "$CODE" = 200 ] || { echo "l'API reste fermée après changement (HTTP $CODE)"; exit 1; }

      # doctor sort en échec si VICI n'est pas branché (mode démo) : ici c'est attendu,
      # on vérifie donc qu'il le SIGNALE, ce qui est tout l'intérêt de la commande.
      - name: swanmgrctl doctor signale le mode démo
        run: sudo swanmgrctl doctor 2>&1 | tee /tmp/doctor.txt; grep -q "MODE DÉMO" /tmp/doctor.txt

      - name: Sauvegarde et restauration
        run: |
          set -euo pipefail
          ARCHIVE="$(sudo swanmgrctl backup | tail -1)"
          sudo test -f "$ARCHIVE"
          # printf (une seule ligne) plutôt que `yes` : `yes` continue d'écrire après que
          # restore a lu sa confirmation → « Broken pipe » que set -o pipefail ferait échouer.
          printf 'restaurer\n' | sudo swanmgrctl restore "$ARCHIVE"
          [ "$(curl -sk -o /dev/null -w '%{http_code}' https://127.0.0.1:7926/healthz)" = 200 ]

      # SECRETS_KEY est la seule chose irremplaçable du produit. « restore » doit REFUSER une
      # archive dont la clé ne correspond pas (sinon la base restaurée serait illisible et le
      # serveur ne démarrerait plus), et --adopt-key doit être le seul moyen de passer outre.
      - name: restore refuse une clé qui ne correspond pas, et --adopt-key répare
        run: |
          set -euo pipefail
          ARCHIVE="$(sudo swanmgrctl backup | tail -1)"

          # On simule la perte de la clé (machine réinstallée, fichier env régénéré).
          sudo sed -i "s|^SECRETS_KEY=.*|SECRETS_KEY=$(openssl rand -hex 32)|" \
            /etc/strongswan-manager/strongswan-manager.env

          if printf 'restaurer\n' | sudo swanmgrctl restore "$ARCHIVE"; then
            echo "restore a ACCEPTÉ une archive dont la clé ne correspond pas : la base serait illisible"
            exit 1
          fi
          echo "✔ restore a refusé (attendu)"

          printf 'restaurer\n' | sudo swanmgrctl restore "$ARCHIVE" --adopt-key
          [ "$(curl -sk -o /dev/null -w '%{http_code}' https://127.0.0.1:7926/healthz)" = 200 ]

      # upgrade remplace le binaire et redémarre : c'est la commande la plus destructrice.
      # Son retour arrière automatique n'avait jamais tourné.
      - name: swanmgrctl upgrade, puis rollback automatique sur binaire cassé
        run: |
          set -euo pipefail
          sudo swanmgrctl upgrade --bundle "$BUNDLE"
          [ "$(curl -sk -o /dev/null -w '%{http_code}' https://127.0.0.1:7926/healthz)" = 200 ]

          # Un binaire qui ne démarre pas : l'upgrade doit échouer ET restaurer le précédent.
          mkdir -p /tmp/bad
          printf '#!/bin/sh\nexit 1\n' > /tmp/bad/strongswan-manager
          chmod +x /tmp/bad/strongswan-manager
          if sudo swanmgrctl upgrade --bundle /tmp/bad; then
            echo "l'upgrade vers un binaire cassé a « réussi » : le garde-fou est mort"
            exit 1
          fi
          echo "✔ l'upgrade a échoué (attendu)"

          # …et le service doit être revenu tout seul sur l'ancien binaire.
          [ "$(curl -sk -o /dev/null -w '%{http_code}' https://127.0.0.1:7926/healthz)" = 200 ]
          INSTALLED="$(sudo swanmgrctl version)"
          [ "$INSTALLED" = "v0.0.0-ci" ] || { echo "le rollback n'a pas restauré l'ancien binaire ($INSTALLED)"; exit 1; }

      - name: Réinstallation idempotente (secrets conservés)
        run: |
          set -euo pipefail
          BEFORE="$(sudo sed -n 's/^SECRETS_KEY=//p' /etc/strongswan-manager/strongswan-manager.env)"
          sudo "$BUNDLE/install.sh" --yes --no-strongswan
          AFTER="$(sudo sed -n 's/^SECRETS_KEY=//p' /etc/strongswan-manager/strongswan-manager.env)"
          [ "$BEFORE" = "$AFTER" ] || { echo "SECRETS_KEY a été régénérée : les données seraient perdues"; exit 1; }

      # --skip-deps est LE chemin annoncé pour l'air-gap : il n'installe aucun paquet.
      - name: Installation --skip-deps (chemin air-gap)
        run: |
          set -euo pipefail
          sudo "$BUNDLE/install.sh" --yes --no-strongswan --skip-deps
          [ "$(curl -sk -o /dev/null -w '%{http_code}' https://127.0.0.1:7926/healthz)" = 200 ]

      - name: Désinstallation
        run: |
          sudo /usr/share/strongswan-manager/uninstall.sh
          ! systemctl is-active --quiet strongswan-manager

      - name: Journaux en cas d'échec
        if: failure()
        run: sudo journalctl -u strongswan-manager -n 100 --no-pager || true

  # Mode « depuis le dépôt cloné » : compile le front + le binaire, puis installe. Go et Node
  # sont ici déjà présents (setup-*), donc c'est le chemin « chaîne d'outils détectée » qui est
  # exercé ; le repli par téléchargement des chaînes officielles ne l'est pas (200 Mo en CI).
  installer-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: actions/setup-go@v5
        with: { go-version: '1.23', cache-dependency-path: backend/go.sum }

      - name: Installer depuis les sources
        # sudo -E env PATH : sans cela, le secure_path de sudo masquerait go et node.
        run: sudo -E env "PATH=$PATH" ./deploy/install.sh --from-source --yes --no-strongswan

      - name: La console répond, et la version vient bien des sources
        run: |
          set -euo pipefail
          [ "$(curl -sk -o /dev/null -w '%{http_code}' https://127.0.0.1:7926/healthz)" = 200 ]
          sudo swanmgrctl version   # doit refléter git describe, pas « dev »

      - name: Journaux en cas d'échec
        if: failure()
        run: sudo journalctl -u strongswan-manager -n 100 --no-pager || true

  # Installation AVEC strongSwan réel : c'est le seul test qui prouve que la console peut
  # vraiment piloter charon (VICI testé sous l'identité du service). Si VICI ne répond pas,
  # l'installeur DOIT échouer — ce job vérifie qu'il réussit quand tout est en place.
  installer-vici:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/web/package-lock.json
      - working-directory: backend/web
        run: npm ci && npm run build
      - uses: actions/setup-go@v5
        with: { go-version: '1.23', cache-dependency-path: backend/go.sum }

      - name: Assembler un bundle
        run: |
          NAME="strongswan-manager_v0.0.0-ci_linux_amd64"
          mkdir -p "/tmp/$NAME/lib"
          (cd backend && CGO_ENABLED=0 go build -ldflags "-X main.version=v0.0.0-ci" \
            -o "/tmp/$NAME/strongswan-manager" ./cmd/server)
          cp deploy/install.sh deploy/uninstall.sh deploy/swanmgrctl \
             deploy/strongswan-manager.service "/tmp/$NAME/"
          cp deploy/lib/common.sh "/tmp/$NAME/lib/"
          chmod +x "/tmp/$NAME"/{install.sh,uninstall.sh,swanmgrctl}
          echo "BUNDLE=/tmp/$NAME" >> "$GITHUB_ENV"

      # Sans --no-strongswan : l'installeur pose strongSwan, ouvre le socket VICI au groupe
      # swanmgr, et REFUSE de terminer si le service ne parvient pas à parler à charon.
      - name: Installer avec strongSwan (VICI doit répondre)
        run: sudo "$BUNDLE/install.sh" --yes

      - name: doctor confirme que VICI est branché (et NON le mode démo)
        run: |
          set -euo pipefail
          sudo swanmgrctl doctor | tee /tmp/doctor.txt || true
          grep -q "socket VICI" /tmp/doctor.txt
          if grep -q "MODE DÉMO" /tmp/doctor.txt; then
            echo "la console est en mode démo alors que strongSwan est installé"; exit 1
          fi

      # Le comportement le plus fortement revendiqué du produit : strongSwan présent mais
      # injoignable ⇒ l'installeur REFUSE de terminer, plutôt que de livrer une console qui
      # affiche des tunnels simulés en croyant piloter de vrais tunnels. Seul le cas passant
      # était testé ; voici le cas d'échec.
      - name: VICI injoignable ⇒ l'installeur DOIT échouer
        run: |
          set -uo pipefail
          sudo /usr/share/strongswan-manager/uninstall.sh

          # charon ne pourra plus démarrer : le socket VICI n'existera pas.
          sudo systemctl stop strongswan.service || true
          sudo systemctl mask strongswan.service

          if sudo "$BUNDLE/install.sh" --yes; then
            echo "L'INSTALLEUR A RÉUSSI alors que VICI est injoignable : le garde-fou est mort."
            sudo systemctl unmask strongswan.service
            exit 1
          fi
          echo "✔ l'installeur a refusé de terminer (attendu)"
          sudo systemctl unmask strongswan.service

      - name: Journaux en cas d'échec
        if: failure()
        run: |
          sudo journalctl -u strongswan-manager -n 60 --no-pager || true
          sudo journalctl -u strongswan -n 60 --no-pager || true
          sudo ls -l /run/charon.vici || true

  # Les paquets étaient testés SUR LE RUNNER — qui a PostgreSQL préinstallé. Le test passait
  # donc grâce à l'image du runner, pas grâce au paquet : sur une machine propre, la base
  # n'était jamais provisionnée. On teste désormais dans des conteneurs VIERGES, avec systemd,
  # sur les deux familles de distributions visées.
  installer-package:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { distro: debian, image: debian:12, fmt: deb }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/web/package-lock.json
      - working-directory: backend/web
        run: npm ci && npm run build
      - uses: actions/setup-go@v5
        with: { go-version: '1.23', cache-dependency-path: backend/go.sum }

      - name: Construire le paquet (comme la release)
        run: |
          set -euo pipefail
          mkdir -p backend/dist/pkg /tmp/pkg
          (cd backend && CGO_ENABLED=0 go build -ldflags "-X main.version=v0.0.0-ci" \
            -o dist/pkg/strongswan-manager ./cmd/server)
          curl -fsSL https://github.com/goreleaser/nfpm/releases/download/v2.41.1/nfpm_2.41.1_Linux_x86_64.tar.gz \
            | tar xz -C /tmp nfpm
          GOARCH=amd64 SEMVER=0.0.0 /tmp/nfpm package -f deploy/nfpm.yaml -p ${{ matrix.fmt }} -t /tmp/pkg/
          ls -l /tmp/pkg/

      # Machine VIERGE : ni PostgreSQL, ni strongSwan. C'est au paquet de les tirer.
      - name: Conteneur ${{ matrix.image }} avec systemd (aucun prérequis installé)
        run: |
          set -euo pipefail
          mkdir -p /tmp/img
          if [ "${{ matrix.distro }}" = debian ]; then
            cat > /tmp/img/Dockerfile <<'EOF'
          FROM debian:12
          RUN apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
                systemd systemd-sysv curl ca-certificates procps iproute2 >/dev/null
          STOPSIGNAL SIGRTMIN+3
          CMD ["/lib/systemd/systemd"]
          EOF
          else
            cat > /tmp/img/Dockerfile <<'EOF'
          FROM almalinux:9
          # EPEL : strongSwan n'est PAS dans les dépôts de base de RHEL/AlmaLinux.
          RUN dnf -y install --allowerasing systemd curl procps-ng iproute epel-release >/dev/null && dnf clean all
          STOPSIGNAL SIGRTMIN+3
          CMD ["/usr/sbin/init"]
          EOF
          fi
          docker build -q -t box -f /tmp/img/Dockerfile /tmp/img
          # --shm-size : PostgreSQL a besoin de mémoire partagée ; les 64 Mo par défaut de
          # Docker ne suffisent pas et le postmaster meurt au démarrage.
          docker run -d --name box --privileged --cgroupns=host --shm-size=1g \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw -v /tmp/pkg:/pkg:ro box
          for i in $(seq 60); do
            docker exec box systemctl is-system-running 2>/dev/null | grep -qE 'running|degraded' && break
            sleep 2
          done
          docker exec box systemctl is-system-running || true

      - name: Le paquet installe TOUT ce dont il a besoin, et n'est PAS en mode démo
        run: |
          set -euo pipefail
          if [ "${{ matrix.fmt }}" = deb ]; then
            docker exec box bash -c 'apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y -qq /pkg/*.deb'
          else
            docker exec box bash -c 'dnf -y install /pkg/*.rpm'
          fi

          # Le paquet doit avoir tiré le SERVEUR PostgreSQL (pas seulement le client)…
          docker exec box sh -c 'command -v psql && command -v pg_dump' >/dev/null
          docker exec box systemctl is-active --quiet postgresql
          # …et strongSwan, swanctl compris.
          docker exec box sh -c 'command -v swanctl' >/dev/null

          # Les binaires vont dans /usr/bin (sinon « sudo swanmgrctl » serait introuvable).
          docker exec box test -x /usr/bin/strongswan-manager
          docker exec box test -x /usr/bin/swanmgrctl
          docker exec box test -f /etc/strongswan-manager/strongswan-manager.env

          docker exec box systemctl is-active --quiet strongswan-manager
          CODE="$(docker exec box curl -sk -o /dev/null -w '%{http_code}' https://127.0.0.1:7926/healthz)"
          [ "$CODE" = 200 ] || { echo "la console ne répond pas (HTTP $CODE)"; exit 1; }

          # Le piège : notre postinstall tournait AVANT que strongSwan soit configuré, et
          # gravait le mode démo. Et sur RHEL, le socket est /run/strongswan/charon.vici, pas
          # /run/charon.vici : le chemin était codé en dur. VICI_ENDPOINTS doit être renseigné.
          docker exec box grep -q '^VICI_ENDPOINTS=local=unix:' /etc/strongswan-manager/strongswan-manager.env \
            || { echo "le paquet a livré un MODE DÉMO : VICI_ENDPOINTS est vide"; exit 1; }

      - name: Mise à jour — secrets et base conservés, service toujours activé au boot
        run: |
          set -euo pipefail
          BEFORE="$(docker exec box sed -n 's/^SECRETS_KEY=//p' /etc/strongswan-manager/strongswan-manager.env)"
          if [ "${{ matrix.fmt }}" = deb ]; then
            docker exec box bash -c 'DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --reinstall /pkg/*.deb'
          else
            docker exec box bash -c 'dnf -y reinstall /pkg/*.rpm'
          fi
          AFTER="$(docker exec box sed -n 's/^SECRETS_KEY=//p' /etc/strongswan-manager/strongswan-manager.env)"
          [ "$BEFORE" = "$AFTER" ] || { echo "SECRETS_KEY régénérée à la mise à jour : données perdues"; exit 1; }
          docker exec box systemctl is-enabled --quiet strongswan-manager \
            || { echo "le service n'est plus activé au démarrage après une mise à jour"; exit 1; }
          sleep 3
          CODE="$(docker exec box curl -sk -o /dev/null -w '%{http_code}' https://127.0.0.1:7926/healthz)"
          [ "$CODE" = 200 ] || { echo "la console ne répond pas (HTTP $CODE)"; exit 1; }

      - name: Retrait — la base et la configuration SURVIVENT
        run: |
          set -euo pipefail
          if [ "${{ matrix.fmt }}" = deb ]; then
            docker exec box bash -c 'DEBIAN_FRONTEND=noninteractive apt-get remove -y -qq strongswan-manager'
          else
            docker exec box bash -c 'dnf -y remove strongswan-manager'
          fi
          ! docker exec box systemctl is-active --quiet strongswan-manager
          docker exec box test -f /etc/strongswan-manager/strongswan-manager.env

      - name: Diagnostic en cas d'échec
        if: failure()
        run: |
          echo "--- PostgreSQL :"
          docker exec box systemctl status postgresql --no-pager -l || true
          docker exec box sh -c 'tail -30 /var/lib/pgsql/data/log/* 2>/dev/null || tail -30 /var/lib/pgsql/initdb_postgresql.log 2>/dev/null' || true
          echo "--- unités strongswan disponibles :"
          docker exec box systemctl list-unit-files '*strongswan*' --no-legend || true
          echo "--- état de chaque unité :"
          for u in strongswan strongswan-swanctl strongswan-starter; do
            echo "  [$u] $(docker exec box systemctl is-active $u.service 2>&1 || true)"
          done
          echo "--- swanctl :"; docker exec box sh -c 'command -v swanctl && swanctl --version' || true
          echo "--- socket :"; docker exec box ls -l /run/charon.vici /var/run/charon.vici || true
          echo "--- status :"; docker exec box systemctl status strongswan --no-pager -l || true
          docker exec box journalctl -u strongswan-manager -n 60 --no-pager || true

  # LA méthode mise en avant — « curl … | sudo bash » — n'était testée par rien, alors que
  # c'est celle qui a cassé deux fois (curl: (23) au ré-exec, puis la confirmation lue sur un
  # tube mort). On l'exécute ici telle qu'un utilisateur la tape : par un TUBE.
  #
  # Le bootstrap télécharge la DERNIÈRE RELEASE : ce job teste donc le script d'amorçage de
  # `main` contre le bundle publié. C'est exactement ce que vit l'utilisateur.
  installer-oneliner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # LA vraie commande, telle qu'un utilisateur la tape : le script vient de
      # raw.githubusercontent (épinglé sur CE commit), et il est piloté par un TUBE.
      # On ne capture PAS la sortie de bash dans un tee : ce harnais-là masquait le problème
      # plus qu'il ne le révélait. Seule la stderr de curl est isolée, pour vérifier qu'aucun
      # « curl: (23) » ne survient — c'est-à-dire que le tube est bien drainé avant le ré-exec.
      - name: curl … | sudo bash (tube, sans terminal — comme cloud-init)
        run: |
          set +e
          URL="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/deploy/install.sh"
          curl -fsSL "$URL" 2>/tmp/curl.err | sudo bash -s -- --yes --no-strongswan
          rc=$?
          echo "--- code retour de l'installeur : $rc"
          echo "--- stderr de curl :"; cat /tmp/curl.err

          if grep -q "(23)" /tmp/curl.err; then
            echo "curl (23) : le tube n'est pas drainé avant le ré-exec"; exit 1
          fi
          [ "$rc" -eq 0 ] || { echo "le one-liner a échoué (code $rc)"; exit 1; }

      - name: La console tourne, et le binaire vient bien de la release
        run: |
          set -euo pipefail
          [ "$(curl -sk -o /dev/null -w '%{http_code}' https://127.0.0.1:7926/healthz)" = 200 ]
          # Même piège que dans install.sh : « curl | grep -m1 » fait sortir curl en 23 (EPIPE).
          api="$(curl -fsSL https://api.github.com/repos/${{ github.repository }}/releases/latest)"
          LATEST="$(printf '%s\n' "$api" | grep -m1 '"tag_name"' | cut -d'"' -f4)"
          # « cmd | grep -q » : grep ferme le tube, cmd prend un SIGPIPE, et pipefail fait
          # échouer l'étape. Le même piège que dans install.sh — on compare une valeur.
          INSTALLED="$(sudo swanmgrctl version)"
          [ "$INSTALLED" = "$LATEST" ] || { echo "version installée=$INSTALLED, attendue=$LATEST"; exit 1; }

      - name: Journaux en cas d'échec
        if: failure()
        run: sudo journalctl -u strongswan-manager -n 60 --no-pager || true

  # Le cycle de vie complet du RPM exigerait une vraie machine RHEL : charon (EPEL) ne démarre
  # pas de façon fiable dans un conteneur, même privilégié — deux exécutions consécutives
  # donnaient des résultats différents. Construire une CI sur un test instable serait pire que
  # de ne pas le tester.
  #
  # On vérifie donc ce qui est DÉTERMINISTE, et qui couvre exactement les régressions passées :
  # les dépendances déclarées et l'emplacement des fichiers. Le comportement (postinstall,
  # VICI, base) est prouvé par installer-package (Debian) et installer-vici (vraie machine).
  package-rpm-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/web/package-lock.json
      - working-directory: backend/web
        run: npm ci && npm run build
      - uses: actions/setup-go@v5
        with: { go-version: '1.23', cache-dependency-path: backend/go.sum }

      - name: Construire le RPM
        run: |
          set -euo pipefail
          mkdir -p backend/dist/pkg
          (cd backend && CGO_ENABLED=0 go build -ldflags "-X main.version=v0.0.0-ci" \
            -o dist/pkg/strongswan-manager ./cmd/server)
          curl -fsSL https://github.com/goreleaser/nfpm/releases/download/v2.41.1/nfpm_2.41.1_Linux_x86_64.tar.gz \
            | tar xz -C /tmp nfpm
          GOARCH=amd64 SEMVER=0.0.0 /tmp/nfpm package -f deploy/nfpm.yaml -p rpm -t /tmp/
          echo "RPM=$(ls /tmp/*.rpm)" >> "$GITHUB_ENV"

      - name: Le RPM exige le SERVEUR PostgreSQL et strongSwan, et pose ses binaires dans /usr/bin
        run: |
          set -euo pipefail
          sudo apt-get update -qq && sudo apt-get install -y -qq rpm

          # On capture UNE FOIS : « rpm … | grep -q » ferait sortir rpm en SIGPIPE, et pipefail
          # transformerait ça en fausse alerte.
          REQ="$(rpm -qp --requires "$RPM")"
          FILES="$(rpm -qlp "$RPM")"
          echo "--- dépendances déclarées :"; echo "$REQ"
          echo "--- fichiers :"; echo "$FILES"

          for dep in postgresql-server postgresql strongswan; do
            echo "$REQ" | grep -qx "$dep" \
              || { echo "dépendance MANQUANTE : $dep — une machine propre resterait sans lui"; exit 1; }
          done

          for f in /usr/bin/strongswan-manager /usr/bin/swanmgrctl \
                   /usr/share/strongswan-manager/lib/common.sh \
                   /etc/systemd/system/strongswan-manager.service; do
            echo "$FILES" | grep -qx "$f" || { echo "fichier absent du paquet : $f"; exit 1; }
          done

          # /usr/local est réservé à l'administrateur : un paquet n'a rien à y faire — et le
          # secure_path de sudo ne l'inclut pas, « sudo swanmgrctl » y serait introuvable.
          if echo "$FILES" | grep -q '^/usr/local'; then
            echo "le paquet écrit dans /usr/local"; exit 1
          fi

  # RHEL/AlmaLinux impose « ident » sur 127.0.0.1 dans pg_hba.conf : l'authentification par
  # MOT DE PASSE y est refusée, alors que notre DSN en utilise un. La base tournait, le rôle
  # existait, et la console ne pouvait pas s'y connecter — « PostgreSQL INJOIGNABLE ».
  #
  # Ce job le prouve de façon DÉTERMINISTE : pas de charon (--no-strongswan), donc aucune des
  # instabilités qui rendent le cycle de vie complet du RPM intestable en conteneur.
  installer-rhel-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/web/package-lock.json
      - working-directory: backend/web
        run: npm ci && npm run build
      - uses: actions/setup-go@v5
        with: { go-version: '1.23', cache-dependency-path: backend/go.sum }

      - name: Assembler un bundle
        run: |
          set -euo pipefail
          NAME="strongswan-manager_v0.0.0-ci_linux_amd64"
          mkdir -p "/tmp/b/$NAME/lib"
          (cd backend && CGO_ENABLED=0 go build -ldflags "-X main.version=v0.0.0-ci" \
            -o "/tmp/b/$NAME/strongswan-manager" ./cmd/server)
          cp deploy/install.sh deploy/uninstall.sh deploy/swanmgrctl \
             deploy/strongswan-manager.service "/tmp/b/$NAME/"
          cp deploy/lib/common.sh "/tmp/b/$NAME/lib/"
          chmod +x "/tmp/b/$NAME"/{install.sh,uninstall.sh,swanmgrctl}
          echo "NAME=$NAME" >> "$GITHUB_ENV"

      - name: "AlmaLinux 9 avec PostgreSQL (pg_hba par défaut : ident)"
        run: |
          set -euo pipefail
          mkdir -p /tmp/img
          cat > /tmp/img/Dockerfile <<'EOF'
          FROM almalinux:9
          RUN dnf -y install --allowerasing systemd curl tar procps-ng iproute \
                postgresql-server postgresql >/dev/null && dnf clean all
          STOPSIGNAL SIGRTMIN+3
          CMD ["/usr/sbin/init"]
          EOF
          docker build -q -t rhelbox -f /tmp/img/Dockerfile /tmp/img
          docker run -d --name rbox --privileged --cgroupns=host --shm-size=1g \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw -v /tmp/b:/b:ro rhelbox
          for i in $(seq 60); do
            docker exec rbox systemctl is-system-running 2>/dev/null | grep -qE 'running|degraded' && break
            sleep 2
          done

      - name: Installer, et prouver que la base est JOIGNABLE avec le DSN
        run: |
          set -euo pipefail
          docker exec rbox bash -c "cp -r /b/$NAME /root/b && chmod +x /root/b/install.sh /root/b/swanmgrctl"
          docker exec rbox /root/b/install.sh --yes --no-strongswan --skip-deps

          # Le cœur du test : le DSN configuré doit RÉELLEMENT ouvrir une connexion.
          docker exec rbox sh -c 'psql "$(sed -n "s/^DATABASE_URL=//p" /etc/strongswan-manager/strongswan-manager.env)" -tAc "SELECT 1"' \
            | grep -qx 1 || { echo "la base reste INJOIGNABLE avec le DSN"; exit 1; }

          CODE="$(docker exec rbox curl -sk -o /dev/null -w '%{http_code}' https://127.0.0.1:7926/healthz)"
          [ "$CODE" = 200 ] || { echo "la console ne répond pas (HTTP $CODE)"; exit 1; }

          # doctor ne doit PAS se plaindre de la base (le mode démo, lui, est attendu ici).
          docker exec rbox swanmgrctl doctor > /tmp/d.txt 2>&1 || true
          cat /tmp/d.txt
          if grep -q "PostgreSQL INJOIGNABLE" /tmp/d.txt; then
            echo "doctor signale toujours la base injoignable"; exit 1
          fi

      - name: Diagnostic en cas d'échec
        if: failure()
        run: |
          docker exec rbox cat /var/lib/pgsql/data/pg_hba.conf | grep -vE '^#|^$' || true
          docker exec rbox journalctl -u strongswan-manager -n 40 --no-pager || true
