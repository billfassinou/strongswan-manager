name: Deploy site & docs to GitHub Pages

# Publie le dossier `site/` (vitrine + documentation) tel quel : c'est du statique,
# sans build ni dépendance. Le `.nojekyll` du dossier empêche GitHub de faire passer
# les fichiers .md dans Jekyll — le viewer de la doc les `fetch()` et les rend lui-même.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule publication à la fois ; on ne coupe pas un déploiement en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Upload site/
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
