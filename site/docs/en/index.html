<script>
/* ---------- Table of contents ---------- */
const PARTS = [
  ["Getting started", [
    ["01-presentation", "Overview"],
    ["02-installation", "Installation"],
    ["03-decouvrir-linterface", "A tour of the interface"],
  ]],
  ["Everyday tasks", [
    ["04-creer-un-tunnel", "Create a tunnel"],
    ["05-piloter-un-tunnel", "Operate a tunnel"],
    ["06-secrets", "Manage secrets"],
    ["07-pki-certificats", "PKI & certificates"],
    ["08-site-a-site-deux-cotes", "Site-to-site, both ends"],
    ["09-score-de-securite", "Security score"],
    ["10-versions-et-rollback", "Versions & rollback"],
    ["11-modules-configuration", "Configuration modules"],
    ["12-superviser", "Monitor"],
    ["13-auditer", "Audit"],
  ]],
  ["Operations", [
    ["14-connecter-passerelles-reelles", "Connect real gateways"],
    ["15-depannage", "Troubleshooting"],
    ["16-faq", "FAQ"],
  ]],
  ["Reference", [
    ["A1-roles-et-permissions", "Roles & permissions"],
    ["A2-configuration", "Environment variables"],
    ["A3-api", "REST & WebSocket API"],
    ["A4-glossaire", "Glossary"],
  ]],
];

const HOME = `
<div class="home-hero">
  <h1>Documentation</h1>
  <p style="color:var(--text-dim);font-size:17px;max-width:640px">
    The user guide to <strong>StrongSwan Manager</strong>: from installation to every everyday task.
    Every page is a concrete walkthrough.
  </p>
  <p><a class="btn pri" href="#/02-installation">Install and run</a>
     <a class="btn" href="#/03-decouvrir-linterface">Guided tour</a></p>
</div>
` + PARTS.map(([title, items]) => `
<div class="doc-part">
  <h2 style="border:0;margin-top:22px">${title}</h2>
  <div class="doc-list">
    ${items.map(([id, label]) => `<a href="#/${id}"><em>${id.split("-")[0]}</em><b>${label}</b></a>`).join("")}
  </div>
</div>`).join("");

/* ---------- Markdown rendering (minimal, self-contained) ---------- */
function esc(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
function slug(s) { return s.toLowerCase().replace(/[^\w\s-]/g, "").trim().replace(/\s+/g, "-"); }
function inline(s) {
  return esc(s)
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>")
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m, t, u) => {
      if (/^(https?:|mailto:|#)/.test(u)) return `<a href="${u}">${t}</a>`;
      return `<a href="#/${u.replace(/\.md$/, "")}">${t}</a>`;
    });
}
function render(src) {
  const L = src.split("\n"); const out = []; let i = 0;
  const isList = l => /^\s*[-*]\s+/.test(l), isNum = l => /^\s*\d+\.\s+/.test(l);
  while (i < L.length) {
    const l = L[i];
    if (/^```/.test(l)) { const c = []; i++; while (i < L.length && !/^```/.test(L[i])) c.push(L[i++]); i++; out.push("<pre>" + esc(c.join("\n")) + "</pre>"); continue; }
    if (/^\s*$/.test(l)) { i++; continue; }
    let m;
    if ((m = l.match(/^(#{1,4})\s+(.*)$/))) { const n = m[1].length; out.push(`<h${n} id="${slug(m[2])}">${inline(m[2])}</h${n}>`); i++; continue; }
    if (/^-{3,}$/.test(l)) { out.push("<hr/>"); i++; continue; }
    if (/^\|/.test(l)) {
      const rows = []; while (i < L.length && /^\|/.test(L[i])) rows.push(L[i++]);
      const cells = r => r.replace(/^\||\|$/g, "").split("|").map(c => c.trim());
      const head = cells(rows[0]); const body = rows.slice(2).map(cells);
      out.push("<table><thead><tr>" + head.map(h => `<th>${inline(h)}</th>`).join("") + "</tr></thead><tbody>" +
        body.map(r => "<tr>" + r.map(c => `<td>${inline(c)}</td>`).join("") + "</tr>").join("") + "</tbody></table>");
      continue;
    }
    if (/^>\s?/.test(l)) { const q = []; while (i < L.length && /^>\s?/.test(L[i])) q.push(L[i++].replace(/^>\s?/, "")); out.push("<blockquote>" + inline(q.join(" ")) + "</blockquote>"); continue; }
    if (isList(l)) { const it = []; while (i < L.length && isList(L[i])) it.push(L[i++].replace(/^\s*[-*]\s+/, "")); out.push("<ul>" + it.map(x => `<li>${inline(x)}</li>`).join("") + "</ul>"); continue; }
    if (isNum(l)) { const it = []; while (i < L.length && isNum(L[i])) it.push(L[i++].replace(/^\s*\d+\.\s+/, "")); out.push("<ol>" + it.map(x => `<li>${inline(x)}</li>`).join("") + "</ol>"); continue; }
    const p = [];
    while (i < L.length && !/^\s*$/.test(L[i]) && !/^(#|>|\||```|-{3,})/.test(L[i]) && !isList(L[i]) && !isNum(L[i])) p.push(L[i++]);
    if (p.length) out.push("<p>" + inline(p.join(" ")) + "</p>"); else i++;
  }
  return out.join("\n");
}

/* ---------- Routing ---------- */
function buildToc(active) {
  document.getElementById("toc").innerHTML =
    `<a href="#/" class="${active === "" ? "on" : ""}">Home</a>` +
    PARTS.map(([t, items]) => `<b>${t}</b>` + items.map(([id, label]) =>
      `<a href="#/${id}" class="${id === active ? "on" : ""}">${label}</a>`).join("")).join("");
}
async function route() {
  const page = (location.hash.replace(/^#\/?/, "") || "").trim();
  buildToc(page);
  const el = document.getElementById("content");
  if (!page) { el.innerHTML = HOME; window.scrollTo(0, 0); return; }
  try {
    const res = await fetch(page + ".md");
    if (!res.ok) throw new Error(res.status);
    el.innerHTML = render(await res.text());
  } catch (e) {
    el.innerHTML = `<h1>Page not found</h1><p><code>${page}.md</code> could not be loaded.</p>
      <p>If you opened this file straight from disk, serve the folder instead:
      <code>python3 -m http.server</code>, then open <code>http://localhost:8000/docs/en/</code>.</p>
      <p><a href="#/">← Back to contents</a></p>`;
  }
  window.scrollTo(0, 0);
}
addEventListener("hashchange", route);
route();

/* ---------- Theme ---------- */
const root = document.documentElement;
const saved = localStorage.getItem("ssm_site_theme");
if (saved) root.setAttribute("data-theme", saved);
document.getElementById("theme").addEventListener("click", () => {
  const cur = root.getAttribute("data-theme") || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  const next = cur === "dark" ? "light" : "dark";
  root.setAttribute("data-theme", next);
  localStorage.setItem("ssm_site_theme", next);
});
</script>
</body>
</html>
