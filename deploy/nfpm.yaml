#
# Paquets .deb et .rpm (nfpm). Construits par .github/workflows/release.yml, qui pose
# BIN_PATH (binaire déjà compilé), SEMVER et GOARCH.
#
# Ce que le paquet apporte par rapport au bundle : la mise à jour par le gestionnaire de
# paquets (apt/dnf upgrade), avec conservation de la configuration.

name: strongswan-manager
arch: ${GOARCH}
platform: linux
version: ${SEMVER}
section: net
priority: optional
maintainer: Bill Fassinou <billfass2010@gmail.com>
description: |
  Console web d'administration pour StrongSwan (IPsec).
  Pilote charon via VICI : tunnels, PKI, secrets, audit, supervision temps réel.
vendor: StrongSwan Manager
homepage: https://billfassinou.github.io/strongswan-manager/
license: AGPL-3.0-or-later

# Dépendances FORTES, et c'est délibéré. Deux raisons, toutes deux vérifiées :
#
# 1. En « recommandé », dpkg/rpm configurent le paquet recommandé APRÈS le nôtre : notre
#    postinstall voyait alors « strongSwan absent » et gravait le MODE DÉMO — alors que
#    strongSwan s'installait deux secondes plus tard. Une dépendance forte garantit l'ordre.
# 2. Ne dépendre que du CLIENT PostgreSQL laissait une machine propre sans serveur : la base
#    n'était jamais provisionnée et le service ne démarrait pas.
#
# Conséquence assumée : le paquet exige strongSwan sur la machine. Une console qui ne pilote
# que des passerelles DISTANTES doit passer par « install.sh --no-strongswan ».
depends:
  - postgresql            # LE SERVEUR (le métapaquet Debian tire aussi le client)
  - strongswan
  - strongswan-swanctl    # swanctl + le plugin vici : sans eux, pas de pilotage
  - charon-systemd

overrides:
  rpm:
    depends:
      - postgresql-server
      - postgresql        # le client : psql et pg_dump, dont swanmgrctl a besoin
      - strongswan        # exige le dépôt EPEL sur RHEL/AlmaLinux/Rocky

contents:
  # nfpm n'expanse PAS les variables d'environnement dans `src` (contrairement à `arch` et
  # `version`) : le workflow copie donc le binaire déjà compilé à cet emplacement fixe.
  - src: ./backend/dist/pkg/strongswan-manager
    dst: /usr/bin/strongswan-manager
    file_info: { mode: 0755 }

  - src: ./deploy/swanmgrctl
    dst: /usr/bin/swanmgrctl
    file_info: { mode: 0755 }

  - src: ./deploy/lib/common.sh
    dst: /usr/share/strongswan-manager/lib/common.sh
    file_info: { mode: 0644 }

  - src: ./deploy/uninstall.sh
    dst: /usr/share/strongswan-manager/uninstall.sh
    file_info: { mode: 0755 }

  - src: ./deploy/strongswan-manager.service
    dst: /etc/systemd/system/strongswan-manager.service
    file_info: { mode: 0644 }


scripts:
  postinstall: ./deploy/scripts/postinstall.sh
  preremove: ./deploy/scripts/preremove.sh
  postremove: ./deploy/scripts/postremove.sh
