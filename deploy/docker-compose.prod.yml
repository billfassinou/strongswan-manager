#
# Déploiement Docker de PRODUCTION — à ne pas confondre avec backend/docker-compose.yml,
# qui est le lab de développement (secrets publics, base éphémère, adaptateur simulé).
#
#   ./docker-install.sh          génère le .env (secrets aléatoires) et démarre tout
#   docker compose -f docker-compose.prod.yml logs -f
#
# Air-gap : récupérez les images sur une machine connectée, puis transportez-les.
#   docker save ghcr.io/billfassinou/strongswan-manager:vX.Y.Z postgres:16-alpine | gzip > images.tar.gz
#   docker load < images.tar.gz     (sur la machine cible)

name: strongswan-manager

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: swan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD manquant — lancez ./docker-install.sh}
      POSTGRES_DB: swan
    # Aucun port publié : la base n'est joignable que depuis le réseau du compose.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swan"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: ghcr.io/billfassinou/strongswan-manager:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: [.env]
    environment:
      DATABASE_URL: "postgres://swan:${POSTGRES_PASSWORD}@postgres:5432/swan?sslmode=disable"
      HTTP_ADDR: ":7926"
      HTTP_REDIRECT_ADDR: ":7927"
    ports:
      # 7927 sert le CRL Distribution Point EN CLAIR : c'est charon qui le lit, et il ne
      # ferait pas confiance à notre CA interne (RFC 5280). Ne le passez pas derrière TLS.
      - "7926:7926"
      - "7927:7927"
    volumes:
      # Cache des certificats ACME (si ACME_DOMAIN est renseigné).
      - acme:/var/lib/strongswan-manager/acme
      # Pour piloter un charon tournant sur l'hôte, décommentez et posez dans .env :
      #   VICI_ENDPOINTS=local=unix:/var/run/charon.vici
      # - /run/charon.vici:/var/run/charon.vici
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7927/healthz"]
      interval: 10s
      timeout: 3s
      retries: 6

volumes:
  pgdata:
  acme:
